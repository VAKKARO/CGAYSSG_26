<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kosice - Relieves Lumínicos</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #FFFFFF; /* Fondo de la página en blanco (galería) */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }
    #control-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 280px;
      background: rgba(10, 10, 12, 0.85);
      border: 1px solid rgba(0, 168, 255, 0.3);
      border-radius: 10px;
      padding: 15px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #FFFFFF;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 1000;
    }
    #mic-section {
      margin-bottom: 15px;
      text-align: center;
    }
    #btn-mic {
      width: 100%;
      background: #FF0055;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      padding: 10px 15px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
      transition: all 0.2s ease;
    }
    #btn-mic:hover {
      background: #ff2a73;
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
    }
    #btn-mic.active {
      background: #00A8FF;
      box-shadow: 0 0 15px rgba(0, 168, 255, 0.4);
      cursor: default;
    }
    #meters-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .meter-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .meter-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #bbbbbb;
    }
    .meter-name {
      font-weight: 500;
    }
    .meter-val {
      font-family: monospace;
    }
    .meter-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.1s ease;
    }
    #fill-silbido { background: #FFCC00; } /* Amarillo */
    #fill-grave { background: #7000FF; }   /* Violeta */
    #fill-siseo { background: #00A8FF; }   /* Celeste */
    #fill-voz { background: #FF0055; }     /* Rosa */
    
    #silence-section {
      margin-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      padding-top: 12px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #bbbbbb;
    }
    #silence-name {
      font-weight: 500;
    }
    #silence-timer {
      font-family: monospace;
      font-weight: bold;
      transition: color 0.3s ease;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
  <div id="control-panel">
    <div id="mic-section">
      <button id="btn-mic">ACTIVAR MICRÓFONO</button>
    </div>
    <div id="meters-section">
      <div class="meter-item">
        <div class="meter-info">
          <span class="meter-name">Silbido (Contracción)</span>
          <span class="meter-val" id="val-silbido">0 / 130</span>
        </div>
        <div class="meter-bar"><div class="meter-fill" id="fill-silbido"></div></div>
      </div>
      <div class="meter-item">
        <div class="meter-info">
          <span class="meter-name">Grave (Vibrar Cilindros)</span>
          <span class="meter-val" id="val-grave">0 / 180</span>
        </div>
        <div class="meter-bar"><div class="meter-fill" id="fill-grave"></div></div>
      </div>
      <div class="meter-item">
        <div class="meter-info">
          <span class="meter-name">Siseo (Vibrar LEDs)</span>
          <span class="meter-val" id="val-siseo">0 / 40</span>
        </div>
        <div class="meter-bar"><div class="meter-fill" id="fill-siseo"></div></div>
      </div>
      <div class="meter-item">
        <div class="meter-info">
          <span class="meter-name">Voz 'gluglu' (Burbujas)</span>
          <span class="meter-val" id="val-voz">0 / 80</span>
        </div>
        <div class="meter-bar"><div class="meter-fill" id="fill-voz"></div></div>
      </div>
    </div>
    <div id="silence-section">
      <span id="silence-name">Silencio (4s para apagar):</span>
      <span id="silence-timer">0.0s / 4.0s</span>
    </div>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
